name: deploy

on:
  push:
    branches:
      - main
      - staging
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          path: main-branch

      - name: checkout staging
        uses: actions/checkout@v4
        with:
          ref: staging
          path: staging-branch

      - name: merge dirs
        run: |
          mkdir public
          cp -r main-branch/* public/
          mkdir public/staging
          cp -r staging-branch/* public/staging/

      - name: upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: deploy to gh pages
        uses: actions/deploy-pages@v4
