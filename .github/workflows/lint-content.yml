name: lint-content

on:
  push:
    paths:
      - 'content/**'
      - 'archetypes/**'
      - '.github/workflows/lint-content.yml'
  pull_request:
    paths:
      - 'content/**'
      - 'archetypes/**'
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout blog repository
        uses: actions/checkout@v4

      - name: Checkout blogcli repository
        uses: actions/checkout@v4
        with:
          repository: RdrSeraphim/blogcli
          path: blogcli

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install blogcli
        run: go install .
        working-directory: blogcli

      - name: Lint content front matter
        run: blogcli lint
